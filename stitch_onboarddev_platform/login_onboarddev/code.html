<label class="font-label-md text-label-md text-on-surface-variant px-1">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-lg h-12 pl-10 pr-4 text-body-md focus:ring-1 focus:ring-primary primary-glow transition-all placeholder:text-outline-variant" placeholder="nome@empresa.com" type="email"/>
</div>
</div>
<div class="space-y-stack-xs">
<div class="flex justify-between items-end px-1">
<label class="font-label-md text-label-md text-on-surface-variant">Senha</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Esqueceu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-lg h-12 pl-10 pr-4 text-body-md focus:ring-1 focus:ring-primary primary-glow transition-all placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full h-12 mt-stack-sm primary-gradient-bg text-on-primary font-headline-md text-[16px] rounded-lg primary-glow hover:brightness-110 active:scale-[0.98] transition-all">
                    Entrar na Plataforma
                </button>
</form>
<footer class="text-center pt-stack-sm">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Não tem uma conta? <a class="text-primary font-bold hover:underline" href="#">Criar agora</a>
</p>
</footer>
</div>
<!-- Demo Mode Button -->
<button class="mt-stack-xl flex items-center gap-stack-sm px-stack-lg py-stack-md rounded-full bg-tertiary-container/10 border border-tertiary/20 text-tertiary hover:bg-tertiary-container/20 transition-all active:scale-95 group">
<span class="text-xl">🎮</span>
<span class="font-label-md text-label-md tracking-wide">Explorar Modo Demo</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Decorative background elements -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none"></div>
<script>
        // Simple entry animation
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });

        // Hover interaction for the inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#c0c1ff';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#908fa0';
            });
        });
    </script>
</body></html>
